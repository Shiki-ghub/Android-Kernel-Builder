name: Build LLVM

on:
  workflow_dispatch:

jobs:
  build-llvm:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout tc-build
        uses: actions/checkout@v4
        with:
          repository: Zycromerz/tc-build
          path: tc-build

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc binutils-dev bison build-essential \
            ca-certificates ccache clang cmake curl \
            file flex git libelf-dev libssl-dev \
            lld make ninja-build python3-dev \
            texinfo u-boot-tools xz-utils zlib1g-dev

      - name: Build LLVM
        run: |
          cd tc-build
          python3 build-llvm.py
